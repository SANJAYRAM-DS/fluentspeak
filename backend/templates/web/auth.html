<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FluentFlow AI</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="auth-page">
  <main class="auth-layout">
    <section class="auth-hero">
      <div class="eyebrow">English practice, reimagined</div>
      <h1>FluentFlow AI</h1>
      <p>Build confidence with guided conversation, immediate corrections, and vocabulary that sticks.</p>
      <div class="feature-row">
        <div class="mini-stat">
          <strong>50</strong>
          <span>topics</span>
        </div>
        <div class="mini-stat">
          <strong>1 turn</strong>
          <span>at a time</span>
        </div>
        <div class="mini-stat">
          <strong>Live</strong>
          <span>feedback</span>
        </div>
      </div>
    </section>
    <section class="auth-panel">
      <div class="tab-row">
        <span class="tab active">Login</span>
        <span class="tab">Create account</span>
      </div>
      <div class="grid-2 auth-grid">
        <form id="login-form" class="form-card">
          <h2>Welcome back</h2>
          <label>Email</label>
          <input name="email" type="email" placeholder="sanjay@example.com" required>
          <label>Password</label>
          <input name="password" type="password" placeholder="••••••••" required>
          <button type="submit">Continue</button>
        </form>
        <form id="register-form" class="form-card">
          <h2>Create account</h2>
          <label>Name</label>
          <input name="name" type="text" placeholder="Sanjay" required>
          <label>Email</label>
          <input name="email" type="email" placeholder="sanjay@example.com" required>
          <label>Password</label>
          <input name="password" type="password" placeholder="Choose a password" required>
          <button type="submit">Start learning</button>
        </form>
      </div>
      <div id="auth-status" class="status-line"></div>
    </section>
  </main>
</body>
</html>
