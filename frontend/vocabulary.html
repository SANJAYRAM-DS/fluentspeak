<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FluentFlow AI - Vocabulary</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body class="app-shell">
  <header class="topbar">
    <a class="brand" href="dashboard.html">
      <span class="brand-mark">F</span>
      <span>FluentFlow AI</span>
    </a>
    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="chat.html">Chat</a>
      <a href="vocabulary.html">Vocabulary</a>
      <a href="progress.html">Progress</a>
    </nav>
    <button class="ghost-button" data-action="logout" type="button">Logout</button>
  </header>
  <main class="shell">
    <section class="hero-band compact-hero">
      <div>
        <div class="eyebrow">Vocabulary memory</div>
        <h1>Words you&#39;ve already learned</h1>
        <p>Review the words the system has saved for you and keep the list growing.</p>
      </div>
      <div class="hero-stats" id="vocabulary-summary"></div>
    </section>
    <section class="content-band">
      <div class="section-head">
        <h2>Learned words</h2>
        <p>Tap a word to mark it mastered or remove it from your list.</p>
      </div>
      <div id="vocabulary-list" class="card-grid topic-grid"></div>
    </section>
  </main>
  <script>
    window.API_BASE_URL = "http://127.0.0.1:8000";
  </script>
  <script src="assets/app.js"></script>
</body>
</html>
